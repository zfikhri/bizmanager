        // --- EXPORT CSV HELPER ---
        const exportToCSV = (headerArr, dataRows, filename) => {
            const escapeCSV = (str) => {
                if (str === null || str === undefined) return '';
                const s = String(str);
                if (s.includes(',') || s.includes('"') || s.includes('\n')) {
                    return `"${s.replace(/"/g, '""')}"`;
                }
                return s;
            };
            const rows = [headerArr.map(escapeCSV), ...dataRows.map(row => row.map(escapeCSV))];
            const csvContent = "data:text/csv;charset=utf-8,\uFEFF" + rows.map(e => e.join(",")).join("\n");
            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", filename);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        };

        // --- 4. INVENTORY VIEW ---
        function InventoryView({ inventory, setInventory, formatRM, t }) {

            const [formData, setFormData] = useState({ item: '', opening: 0, in: 0, out: 0, unitCost: 0 });

            const enrichedInventory = inventory.map(item => {

                const totalValue = balance * item.unitCost;
                return { ...item, balance, totalValue };
            });

            const handleSubmit = (e) => {
                e.preventDefault();
                setInventory([...inventory, { ...formData, id: Date.now() }]);
                setShowForm(false);
                setFormData({ item: '', opening: 0, in: 0, out: 0, unitCost: 0 });
            };

            const updateStock = (id, field, value) => {
                const numVal = parseInt(value) || 0;
                setInventory(inventory.map(item => item.id === id ? { ...item, [field]: numVal } : item));
            };

            const inputClass = "w-full border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 rounded-md p-2 text-sm focus:ring-2 focus:ring-purple-500 outline-none transition-colors";

            return (
                <div className="space-y-4">

                        <button onClick={() => setShowForm(!showForm)} className="w-full sm:w-auto bg-purple-600 hover:bg-purple-700 text-white px-4 py-2.5 sm:py-2 rounded-md text-sm font-medium shadow-sm transition-colors">

                    {showForm && (

                                <div><label className="block text-xs text-gray-500 dark:text-gray-400 mb-1 font-medium">{t('open_stock')}</label><input required type="number" className={inputClass} value={formData.opening} onChange={e => setFormData({...formData, opening: parseInt(e.target.value)})} /></div>
                                <div><label className="block text-xs text-gray-500 dark:text-gray-400 mb-1 font-medium">{t('stock_in')}</label><input required type="number" className={inputClass} value={formData.in} onChange={e => setFormData({...formData, in: parseInt(e.target.value)})} /></div>
                                <div><label className="block text-xs text-gray-500 dark:text-gray-400 mb-1 font-medium">{t('stock_out')}</label><input required type="number" className={inputClass} value={formData.out} onChange={e => setFormData({...formData, out: parseInt(e.target.value)})} /></div>
                                <div><label className="block text-xs text-gray-500 dark:text-gray-400 mb-1 font-medium">{t('unit_cost_rm')}</label><input required type="number" step="0.01" className={inputClass} value={formData.unitCost} onChange={e => setFormData({...formData, unitCost: parseFloat(e.target.value)})} /></div>
                                <div className="col-span-full"><button type="submit" className="w-full bg-purple-600 hover:bg-purple-700 text-white p-2 rounded-md text-sm font-medium transition-colors">{t('save_item')}</button></div>
                            </form>
                        </div>
                    )}

                    <div className="bg-white dark:bg-gray-800 rounded-lg shadow-sm border border-gray-200 dark:border-gray-700 overflow-x-auto transition-colors">
                        <table className="w-full text-left border-collapse min-w-[700px]">
                            <thead>
                                <tr className="bg-purple-50 dark:bg-purple-900/10 border-b border-gray-200 dark:border-gray-700 text-xs uppercase tracking-wider text-purple-800 dark:text-purple-400">
                                    <th className="p-4">{t('item_name')}</th>
                                    <th className="p-4 text-center">{t('open_stock')}</th>
                                    <th className="p-4 text-center text-green-700 dark:text-green-500">{t('stock_in')}</th>
                                    <th className="p-4 text-center text-red-700 dark:text-red-500">{t('stock_out')}</th>
                                    <th className="p-4 text-center bg-purple-100 dark:bg-purple-900/30 rounded-t">{t('balance')}</th>
                                    <th className="p-4 text-right">{t('unit_cost')}</th>
                                    <th className="p-4 text-right">{t('total_value')}</th>
                                </tr>
                            </thead>
                            <tbody className="text-sm divide-y divide-gray-100 dark:divide-gray-700">
                                {enrichedInventory.map((item) => (
                                    <tr key={item.id} className="hover:bg-gray-50 dark:hover:bg-gray-700/30 transition-colors">
                                        <td className="p-4 font-medium text-gray-800 dark:text-gray-200">{item.item}</td>
                                        <td className="p-4 text-center text-gray-500 dark:text-gray-400">{item.opening}</td>
                                        <td className="p-4 text-center">
                                            <input type="number" className="w-16 border border-green-200 dark:border-green-800 rounded text-center p-1 text-sm outline-none focus:ring-1 focus:ring-green-500 bg-green-50 dark:bg-green-900/20 text-green-800 dark:text-green-400 font-medium transition-colors" value={item.in} onChange={(e) => updateStock(item.id, 'in', e.target.value)} />
                                        </td>
                                        <td className="p-4 text-center">
                                            <input type="number" className="w-16 border border-red-200 dark:border-red-800 rounded text-center p-1 text-sm outline-none focus:ring-1 focus:ring-red-500 bg-red-50 dark:bg-red-900/20 text-red-800 dark:text-red-400 font-medium transition-colors" value={item.out} onChange={(e) => updateStock(item.id, 'out', e.target.value)} />
                                        </td>
                                        <td className={`p-4 text-center font-bold bg-purple-50/50 dark:bg-purple-900/10 ${item.balance <= 10 ? 'text-red-600 dark:text-red-400' : 'text-purple-700 dark:text-purple-400'}`}>
                                            {item.balance} {item.balance <= 10 && '⚠️'}
                                        </td>
                                        <td className="p-4 text-right text-gray-500 dark:text-gray-400">{formatRM(item.unitCost)}</td>
                                        <td className="p-4 text-right font-semibold text-gray-700 dark:text-gray-300">{formatRM(item.totalValue)}</td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        }

        // --- 5. PROFIT SUMMARY VIEW ---
        function SummaryView({ sales, expenses, cogs, formatRM, t }) {
            const summaryData = useMemo(() => {
                const monthly = {};

                sales.forEach(s => {
                    const month = s.date.substring(0, 7);
                    if (!monthly[month]) monthly[month] = { month, sales: 0, cogs: 0, expenses: 0 };
                    
                    const cogsItem = cogs.find(c => c.product === s.product);
                    const costPerUnit = cogsItem ? cogsItem.cost : 0;
                    
                    monthly[month].sales += (s.qty * s.sellingPrice);
                    monthly[month].cogs += (s.qty * costPerUnit);
                });

                expenses.forEach(e => {
                    const month = e.date.substring(0, 7);
                    if (!monthly[month]) monthly[month] = { month, sales: 0, cogs: 0, expenses: 0 };
                    monthly[month].expenses += e.amount;
                });

                return Object.values(monthly).map(data => {
                    const grossProfit = data.sales - data.cogs;
                    const netProfit = grossProfit - data.expenses;
                    const roi = data.expenses > 0 ? ((netProfit / data.expenses) * 100).toFixed(1) : 0;
                    return { ...data, grossProfit, netProfit, roi };
                }).sort((a,b) => b.month.localeCompare(a.month));

            }, [sales, expenses, cogs]);

            const formatMonth = (ym) => {
                const [y, m] = ym.split('-');
                const date = new Date(y, parseInt(m)-1);
                return date.toLocaleDateString('en-GB', { month: 'long', year: 'numeric' });
            };

            const handleExport = () => {
                const headers = [t('month'), t('total_sales'), t('total_cogs'), t('gross_profit'), t('total_exp'), t('net_profit'), t('roi')];
                const rows = summaryData.map(r => [r.month, r.sales, r.cogs, r.grossProfit, r.expenses, r.netProfit, r.roi + '%']);
                exportToCSV(headers, rows, 'Profit_Summary.csv');
            };

            return (
                <div className="space-y-4">
                    <div className="flex justify-between items-center mb-6">
                        <p className="text-gray-600 dark:text-gray-400 text-sm">{t('sum_desc')}</p>
                        <button onClick={handleExport} className="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-md text-sm font-medium shadow-sm transition-colors flex justify-center items-center">
                            <svg className="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                            {t('export_csv')}
                        </button>
                    </div>
                    
                    <div className="bg-white dark:bg-gray-800 rounded-lg shadow-sm border border-gray-200 dark:border-gray-700 overflow-x-auto transition-colors">
                        <table className="w-full text-left border-collapse min-w-[600px]">
                            <thead>
                                <tr className="bg-indigo-50 dark:bg-indigo-900/10 border-b border-gray-200 dark:border-gray-700 text-xs uppercase tracking-wider text-indigo-900 dark:text-indigo-400">
                                    <th className="p-4">{t('month')}</th>
                                    <th className="p-4 text-right">{t('total_sales')}</th>
                                    <th className="p-4 text-right">{t('total_cogs')}</th>
                                    <th className="p-4 text-right bg-indigo-100 dark:bg-indigo-900/20">{t('gross_profit')}</th>
                                    <th className="p-4 text-right text-red-800 dark:text-red-400">{t('total_exp')}</th>
                                    <th className="p-4 text-right bg-green-100 dark:bg-green-900/20 text-green-900 dark:text-green-400">{t('net_profit')}</th>
                                </tr>
                            </thead>
                            <tbody className="text-sm divide-y divide-gray-100 dark:divide-gray-700">
                                {summaryData.map((row) => (
                                    <tr key={row.month} className="hover:bg-gray-50 dark:hover:bg-gray-700/30 transition-colors">
                                        <td className="p-4 font-bold text-gray-800 dark:text-gray-200">{formatMonth(row.month)}</td>
                                        <td className="p-4 text-right text-blue-600 dark:text-blue-400 font-medium">{formatRM(row.sales)}</td>
                                        <td className="p-4 text-right text-gray-600 dark:text-gray-400">{formatRM(row.cogs)}</td>
                                        <td className="p-4 text-right bg-indigo-50/50 dark:bg-indigo-900/10 font-semibold text-gray-800 dark:text-gray-200">{formatRM(row.grossProfit)}</td>
                                        <td className="p-4 text-right text-red-600 dark:text-red-400">{formatRM(row.expenses)}</td>
                                        <td className={`p-4 text-right font-bold text-lg ${row.netProfit >= 0 ? 'bg-green-50/50 dark:bg-green-900/10 text-green-600 dark:text-green-400' : 'bg-red-50/50 dark:bg-red-900/10 text-red-600 dark:text-red-400'}`}>
                                            {formatRM(row.netProfit)}
                                        </td>
                                    </tr>
                                ))}
                                {summaryData.length === 0 && <tr><td colSpan="6" className="p-8 text-center text-gray-500 dark:text-gray-400">{t('no_data')}</td></tr>}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        }

        // --- 6. DASHBOARD VIEW (Charts & KPI) ---
        function DashboardView({ sales, expenses, cogs, inventory, formatRM, t, isDarkMode }) {
            const pieChartRef = useRef(null);
            const barChartRef = useRef(null);
            const lineChartRef = useRef(null);
            
            const pieInstance = useRef(null);
            const barInstance = useRef(null);
            const lineInstance = useRef(null);

            const [dateFilter, setDateFilter] = useState('all');
            const [startDate, setStartDate] = useState('');
            const [endDate, setEndDate] = useState('');

            const getLocalYYYYMMDD = (date) => {
                const year = date.getFullYear();
                const month = String(date.getMonth() + 1).padStart(2, '0');
                const day = String(date.getDate()).padStart(2, '0');
                return `${year}-${month}-${day}`;
            };

            const isDateInRange = (dateStr) => {
                if (dateFilter === 'all') return true;
                const todayDate = new Date();
                const todayStr = getLocalYYYYMMDD(todayDate);

                if (dateFilter === 'today') return dateStr === todayStr;
                if (dateFilter === 'week') {
                    const startOfWeek = new Date(todayDate);
                    startOfWeek.setDate(todayDate.getDate() - todayDate.getDay());
                    const endOfWeek = new Date(todayDate);
                    endOfWeek.setDate(todayDate.getDate() - todayDate.getDay() + 6);
                    return dateStr >= getLocalYYYYMMDD(startOfWeek) && dateStr <= getLocalYYYYMMDD(endOfWeek);
                }
                if (dateFilter === 'month') return dateStr.startsWith(todayStr.substring(0, 7));
                if (dateFilter === 'custom') {
                    if (startDate && endDate) return dateStr >= startDate && dateStr <= endDate;
                    if (startDate) return dateStr >= startDate;
                    if (endDate) return dateStr <= endDate;
                    return true;
                }
                return true;
            };

            const filteredSales = useMemo(() => sales.filter(s => isDateInRange(s.date)), [sales, dateFilter, startDate, endDate]);
            const filteredExpenses = useMemo(() => expenses.filter(e => isDateInRange(e.date)), [expenses, dateFilter, startDate, endDate]);

            const totalSales = useMemo(() => filteredSales.reduce((acc, s) => acc + (s.qty * s.sellingPrice), 0), [filteredSales]);
            const totalExpenses = useMemo(() => filteredExpenses.reduce((acc, e) => acc + e.amount, 0), [filteredExpenses]);
            const totalCogs = useMemo(() => filteredSales.reduce((acc, s) => {
                const cost = cogs.find(c => c.product === s.product)?.cost || 0;
                return acc + (s.qty * cost);
            }, 0), [filteredSales, cogs]);
            
            const grossProfit = totalSales - totalCogs;
            const netProfit = grossProfit - totalExpenses;
            const roi = totalExpenses > 0 ? ((netProfit / totalExpenses) * 100) : 0;

            const lowStockAlerts = useMemo(() => {
                return inventory.map(item => ({ ...item, balance: item.opening + item.in - item.out }))
                                .filter(item => item.balance <= 10);
            }, [inventory]);

            const missingReceiptAlerts = useMemo(() => {
                return expenses.filter(e => e.amount >= 500 && !e.receipt);
            }, [expenses]);

            useEffect(() => {
                if (pieInstance.current) pieInstance.current.destroy();
                if (barInstance.current) barInstance.current.destroy();
                if (lineInstance.current) lineInstance.current.destroy();

                const chartTextColor = isDarkMode ? '#9ca3af' : '#6b7280';
                const chartGridColor = isDarkMode ? '#374151' : '#f3f4f6';

                // Pie Chart
                const expCats = {};
                filteredExpenses.forEach(e => { expCats[e.category] = (expCats[e.category] || 0) + e.amount; });
                if (pieChartRef.current) {
                    pieInstance.current = new Chart(pieChartRef.current, {
                        type: 'doughnut',
                        data: {
                            labels: Object.keys(expCats),
                            datasets: [{
                                data: Object.values(expCats),
                                backgroundColor: ['#ef4444', '#f97316', '#eab308', '#84cc16', '#22c55e', '#06b6d4', '#3b82f6', '#8b5cf6'],
                                borderWidth: isDarkMode ? 2 : 0,
                                borderColor: isDarkMode ? '#1f2937' : '#fff'
                            }]
                        },
                        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right', labels: { boxWidth: 12, color: chartTextColor } } } }
                    });
                }

                // Bar Chart
                const prodSales = {};
                filteredSales.forEach(s => { prodSales[s.product] = (prodSales[s.product] || 0) + (s.qty * s.sellingPrice); });
                if (barChartRef.current) {
                    barInstance.current = new Chart(barChartRef.current, {
                        type: 'bar',
                        data: {
                            labels: Object.keys(prodSales),
                            datasets: [{
                                label: t('total_sales'),
                                data: Object.values(prodSales),
                                backgroundColor: '#3b82f6',
                                borderRadius: 4
                            }]
                        },
                        options: { 
                            responsive: true, maintainAspectRatio: false, 
                            scales: { 
                                y: { beginAtZero: true, grid: { color: chartGridColor, borderDash: [4, 4] }, ticks: { color: chartTextColor } }, 
                                x: { grid: { display: false }, ticks: { color: chartTextColor } } 
                            }, 
                            plugins: { legend: { display: false } } 
                        }
                    });
                }

                // Line Chart
                const dailyData = {};
                filteredSales.forEach(s => { dailyData[s.date] = (dailyData[s.date] || 0) + (s.qty * s.sellingPrice); });
                const sortedDates = Object.keys(dailyData).sort();
                const trendValues = sortedDates.map(d => dailyData[d]);

                if (lineChartRef.current) {
                    lineInstance.current = new Chart(lineChartRef.current, {
                        type: 'line',
                        data: {
                            labels: sortedDates,
                            datasets: [{
                                label: t('daily_trend'),
                                data: trendValues,
                                borderColor: '#10b981',
                                backgroundColor: isDarkMode ? 'rgba(16, 185, 129, 0.2)' : 'rgba(16, 185, 129, 0.1)',
                                tension: 0.3, fill: true, pointBackgroundColor: '#10b981'
                            }]
                        },
                        options: { 
                            responsive: true, maintainAspectRatio: false, 
                            scales: { 
                                y: { beginAtZero: true, grid: { color: chartGridColor, borderDash: [4, 4] }, ticks: { color: chartTextColor } }, 
                                x: { grid: { display: false }, ticks: { color: chartTextColor } } 
                            },
                            plugins: { legend: { labels: { color: chartTextColor } } }
                        }
                    });
                }

            }, [filteredSales, filteredExpenses, cogs, t, isDarkMode]);

            const btnClass = (active) => `px-3 py-1.5 text-xs font-semibold rounded-md whitespace-nowrap transition-all ${active ? 'bg-blue-600 text-white shadow-sm' : 'bg-white dark:bg-gray-800 text-gray-600 dark:text-gray-300 border border-gray-200 dark:border-gray-600 hover:bg-gray-50 dark:hover:bg-gray-700'}`;

            return (
                <div className="space-y-6">
                    {/* Alerts Section */}
                    {(lowStockAlerts.length > 0 || missingReceiptAlerts.length > 0) && (
                        <div className="bg-red-50 dark:bg-red-900/30 border-l-4 border-red-500 p-4 rounded-md shadow-sm transition-colors">
                            <h3 className="text-red-800 dark:text-red-300 font-bold text-sm mb-2 flex items-center">
                                <svg className="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                                {t('alerts')}
                            </h3>
                            <ul className="list-disc list-inside text-sm text-red-700 dark:text-red-400 space-y-1">
                                {lowStockAlerts.map(item => (
                                    <li key={`stock-${item.id}`}>
                                        <span className="font-semibold">{t('low_stock')}:</span> {item.item} ({item.balance} unit)
                                    </li>
                                ))}
                                {missingReceiptAlerts.map(exp => (
                                    <li key={`rec-${exp.id}`}>
                                        <span className="font-semibold">{t('missing_receipt')}:</span> {exp.description} ({formatRM(exp.amount)} pada {exp.date})
                                    </li>
                                ))}
                            </ul>
                        </div>
                    )}

                    {/* Date Filters */}
                    <div className="bg-white dark:bg-gray-800 p-4 rounded-lg shadow-sm border border-gray-100 dark:border-gray-700 flex flex-col xl:flex-row justify-between items-start xl:items-center gap-4 transition-colors">
                        <div className="flex space-x-2 overflow-x-auto pb-1 xl:pb-0 w-full xl:w-auto scrollbar-hide">
                            <button onClick={() => setDateFilter('all')} className={btnClass(dateFilter === 'all')}>{t('filter_all')}</button>
                            <button onClick={() => setDateFilter('today')} className={btnClass(dateFilter === 'today')}>{t('filter_today')}</button>
                            <button onClick={() => setDateFilter('week')} className={btnClass(dateFilter === 'week')}>{t('filter_week')}</button>
                            <button onClick={() => setDateFilter('month')} className={btnClass(dateFilter === 'month')}>{t('filter_month')}</button>
                            <button onClick={() => setDateFilter('custom')} className={btnClass(dateFilter === 'custom')}>{t('filter_custom')}</button>
                        </div>
                        
                        {dateFilter === 'custom' && (
                            <div className="flex items-center space-x-2 w-full xl:w-auto text-sm animate-fade-in-down">
                                <input type="date" value={startDate} onChange={e => setStartDate(e.target.value)} className="border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 rounded-md p-1.5 focus:ring-2 focus:ring-blue-500 outline-none w-full" />
                                <span className="text-gray-400 font-bold">-</span>
                                <input type="date" value={endDate} onChange={e => setEndDate(e.target.value)} className="border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 rounded-md p-1.5 focus:ring-2 focus:ring-blue-500 outline-none w-full" />
                            </div>
                        )}
                    </div>

                    {/* KPIs */}
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                        <div className="bg-white dark:bg-gray-800 p-5 rounded-lg shadow-sm border border-gray-100 dark:border-gray-700 flex flex-col transition-colors">
                            <span className="text-gray-500 dark:text-gray-400 text-sm font-medium">{t('kpi_sales')}</span>
                            <span className="text-2xl font-bold text-blue-600 dark:text-blue-400 mt-2">{formatRM(totalSales)}</span>
                        </div>
                        <div className="bg-white dark:bg-gray-800 p-5 rounded-lg shadow-sm border border-gray-100 dark:border-gray-700 flex flex-col transition-colors">
                            <span className="text-gray-500 dark:text-gray-400 text-sm font-medium">{t('total_exp')}</span>
                            <span className="text-2xl font-bold text-red-600 dark:text-red-400 mt-2">{formatRM(totalExpenses)}</span>
                        </div>
                        <div className="bg-white dark:bg-gray-800 p-5 rounded-lg shadow-sm border border-gray-100 dark:border-gray-700 flex flex-col border-l-4 border-l-green-500 transition-colors">
                            <span className="text-gray-500 dark:text-gray-400 text-sm font-medium">{t('net_profit')}</span>
                            <span className={`text-2xl font-bold mt-2 ${netProfit >= 0 ? 'text-green-600 dark:text-green-400' : 'text-red-600 dark:text-red-400'}`}>
                                {formatRM(netProfit)}
                            </span>
                        </div>
                        <div className="bg-white dark:bg-gray-800 p-5 rounded-lg shadow-sm border border-gray-100 dark:border-gray-700 flex flex-col border-l-4 border-l-purple-500 transition-colors">
                            <div className="flex justify-between items-start">
                                <span className="text-gray-500 dark:text-gray-400 text-sm font-medium">{t('roi')}</span>
                                <div className="tooltip cursor-help text-gray-400 dark:text-gray-500 text-xs" title="(Net Profit ÷ Total Expenses) × 100">ⓘ</div>
                            </div>
                            <span className={`text-2xl font-bold mt-2 ${roi >= 0 ? 'text-purple-600 dark:text-purple-400' : 'text-red-600 dark:text-red-400'}`}>
                                {roi.toFixed(1)}%
                            </span>
                        </div>
                    </div>

                    {/* Charts */}
                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        <div className="bg-white dark:bg-gray-800 p-4 sm:p-5 rounded-lg shadow-sm border border-gray-100 dark:border-gray-700 lg:col-span-2 transition-colors">
                            <h3 className="text-gray-800 dark:text-gray-200 font-semibold text-sm mb-4">{t('sales_by_prod')}</h3>
                            <div className="h-56 sm:h-64 relative">
                                <canvas ref={barChartRef}></canvas>
                            </div>
                        </div>

                        <div className="bg-white dark:bg-gray-800 p-4 sm:p-5 rounded-lg shadow-sm border border-gray-100 dark:border-gray-700 transition-colors">
                            <h3 className="text-gray-800 dark:text-gray-200 font-semibold text-sm mb-4">{t('exp_breakdown')}</h3>
                            <div className="h-56 sm:h-64 relative">
                                <canvas ref={pieChartRef}></canvas>
                            </div>
                        </div>

                        <div className="bg-white dark:bg-gray-800 p-4 sm:p-5 rounded-lg shadow-sm border border-gray-100 dark:border-gray-700 lg:col-span-3 transition-colors">
                            <h3 className="text-gray-800 dark:text-gray-200 font-semibold text-sm mb-4">{t('daily_trend')}</h3>
                            <div className="h-56 sm:h-64 relative">
                                <canvas ref={lineChartRef}></canvas>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
